services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: markdown_everything
      POSTGRES_USER: markdown
      POSTGRES_PASSWORD: markdown
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markdown -d markdown_everything"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: &backend-env
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://markdown:markdown@postgres:5432/markdown_everything}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      STORAGE_ROOT: ${STORAGE_ROOT:-/data/markdown-everything}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      SECRET_KEY: ${SECRET_KEY:-change-me-before-production}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
      ASR_PROVIDER: ${ASR_PROVIDER:-local_whisper}
      ASR_BASE_URL: ${ASR_BASE_URL:-}
      ASR_API_KEY: ${ASR_API_KEY:-}
      ASR_MODEL: ${ASR_MODEL:-whisper-1}
      WEB_IMAGE_DOWNLOAD_CONCURRENCY: ${WEB_IMAGE_DOWNLOAD_CONCURRENCY:-6}
      WEB_IMAGE_DOWNLOAD_TIMEOUT_SECONDS: ${WEB_IMAGE_DOWNLOAD_TIMEOUT_SECONDS:-4}
      WEB_IMAGE_DOWNLOAD_BUDGET_SECONDS: ${WEB_IMAGE_DOWNLOAD_BUDGET_SECONDS:-12}
      WEB_RENDER_ENABLED: ${WEB_RENDER_ENABLED:-true}
      WEB_RENDER_TIMEOUT_SECONDS: ${WEB_RENDER_TIMEOUT_SECONDS:-15}
      WEB_RENDER_WAIT_MS: ${WEB_RENDER_WAIT_MS:-1200}
      WEB_RENDER_SCROLL_STEPS: ${WEB_RENDER_SCROLL_STEPS:-2}
      WEB_RENDER_IGNORE_HTTPS_ERRORS: ${WEB_RENDER_IGNORE_HTTPS_ERRORS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - markdown-data:/data/markdown-everything
    expose:
      - "8000"

  worker-web:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: *backend-env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "-Q", "web", "-n", "worker-web@%h"]
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - markdown-data:/data/markdown-everything

  worker-file:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: *backend-env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "-Q", "file", "-n", "worker-file@%h"]
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - markdown-data:/data/markdown-everything

  worker-audio:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: *backend-env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "-Q", "audio", "-n", "worker-audio@%h"]
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - markdown-data:/data/markdown-everything

  worker-video:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: *backend-env
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "--loglevel=INFO", "-Q", "video", "-n", "worker-video@%h"]
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - markdown-data:/data/markdown-everything

  beat:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment: *backend-env
    command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - markdown-data:/data/markdown-everything

  frontend:
    build:
      context: ./frontend
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api}
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
  markdown-data:
