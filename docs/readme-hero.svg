<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MarkdownEverything hero</title>
  <desc id="desc">A product hero showing webpages, files, audio, and video flowing into clean Markdown for AI knowledge systems.</desc>
  <defs>
