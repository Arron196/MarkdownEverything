    <linearGradient id="accent" x1="228" y1="136" x2="957" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#69d2ff"/>
      <stop offset="0.48" stop-color="#9cffc7"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="shadow" x="88" y="44" width="1024" height="456" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.36"/>
