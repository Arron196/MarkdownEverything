  <text x="186" y="194" fill="#b7c5d6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="0">Turn messy public content into clean Markdown for people, AI, RAG, agents, and knowledge bases.</text>

