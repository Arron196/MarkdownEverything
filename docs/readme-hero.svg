      <stop offset="0.52" stop-color="#0f1f2a"/>
      <stop offset="1" stop-color="#182614"/>
    </linearGradient>
    <linearGradient id="panel" x1="145" y1="85" x2="1056" y2="456" gradientUnits="userSpaceOnUse">
